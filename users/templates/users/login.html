{% extends "users/base.html" %}
{% block title %}Sign In — Ethiopian Daily{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <div class="text-center mb-8">
    <div class="h-14 w-14 rounded-full bg-brand-light flex items-center justify-center mx-auto mb-4">
      <svg class="h-7 w-7 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">Ethiopian Daily</h1>
    <p class="text-gray-500 text-sm mt-1">Sign in to manage users</p>
  </div>

  <form method="post" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-4">
    {% csrf_token %}

    {% if form.non_field_errors %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg">
        {% for error in form.non_field_errors %}{{ error }}{% endfor %}
      </div>
    {% endif %}

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
      <input type="email" name="username" autofocus required
             value="{{ form.username.value|default:'' }}"
             placeholder="admin@example.com"
             class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" required
             class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent">
    </div>

    <button type="submit"
            class="w-full bg-brand text-white font-medium text-sm py-2.5 rounded-lg hover:bg-brand-dark transition">
      Sign In
    </button>
  </form>
</div>
{% endblock %}
